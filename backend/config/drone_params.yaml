# HiveLogix — 无人机气动参数配置文件
# =====================================================================
# 物理模型说明（多旋翼功率方程）：
#   P = k1 * (m_empty + payload)^1.5 + k2 * v^3
#   其中:
#     k1: 诱导功率系数    [W / kg^1.5]  — 由悬停功率方程标定
#     k2: 废阻功率系数    [W / (m/s)^3] — 由风洞测试或文献确定
#
# 参数来源：
#   - 轻型：对标 DJI Mini 3 级别，2kg 总重悬停约 80W，15m/s 巡航约 110W
#   - 重型：对标 DJI M30 级别，8kg 总重悬停约 400W，10m/s 巡航约 500W
#   - k1 / k2 可通过场地实测或论文 [cf. Aurambout 2019, UAV energy models] 修正
# =====================================================================

light_drone:
  # 气动参数 —— 每次标定后须同步更新
  k1: 28.3          # W / kg^1.5   (悬停功率主导项)
  k2: 0.0059        # W / (m/s)^3  (巡航速度阻力项)

  # 飞行性能
  cruise_speed: 20.0           # m/s，巡航速度
  payload_capacity: 2.0        # kg，最大有效载荷
  empty_weight: 1.5            # kg，机体自重

  # 电池参数
  battery_capacity_j: 360000   # J，100 Wh ≈ 360,000 J
  # 安全余量：保留总电量的 10% 用于意外情况
  safe_margin_ratio: 0.10

heavy_drone:
  # 气动参数
  k1: 17.7          # W / kg^1.5   (大翼展，诱导系数更低)
  k2: 0.10          # W / (m/s)^3  (较大机体，阻力系数更高)

  # 飞行性能
  cruise_speed: 15.0           # m/s，巡航速度较慢
  payload_capacity: 10.0       # kg，最大有效载荷
  empty_weight: 5.0            # kg，机体自重

  # 电池参数
  battery_capacity_j: 2880000  # J，800 Wh ≈ 2,880,000 J
  safe_margin_ratio: 0.10

# 求解器统一评分参数（所有算法共享）
# f = f_dist + f_energy + f_penalty
solver_energy:
  # 距离成本权重
  c_dist_et: 1.0
  c_dist_uav: 1.0

  # 能耗成本权重
  c_energy_et: 1.0
  c_energy_uav: 1.0

  # 时间惩罚权重
  lambda_time: 1.0

  # 能耗模型参数
  # 卡车能耗: 0.75 kWh/km
  truck_energy_kwh_per_km: 0.75
  # 无人机评分能耗模型: physics(复用 drone.py 功率模型) / alpha(线性经验模型)
  uav_energy_model: physics
  # 无人机能耗: alpha_k in Wh/(kg·km)
  # 仅在 uav_energy_model=alpha 时生效
  uav_alpha_wh_per_kg_km: 0.24

  # 业务约束：是否允许无人机在运动中的卡车上直接起飞（模式B）
  # false: 仅允许 B_WAIT（随车到站后起飞）
  allow_moving_truck_launch: false

  # 业务时长参数（所有算法共享）
  # 卡车配送订单（到达客户点后的服务停留）
  truck_service_time_order_s: 60
  # 无人机配送订单（到达客户点后的服务停留）
  drone_service_time_order_s: 30
  # 卡车放飞无人机操作时长
  truck_drone_launch_time_s: 10
  # 卡车接回无人机操作时长
  truck_drone_recover_time_s: 10
