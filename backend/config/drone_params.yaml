# HiveLogix — 无人机气动参数配置文件
# =====================================================================
# 物理模型说明（多旋翼功率方程）：
#   P = k1 * (m_empty + payload)^1.5 + k2 * v^3
#   其中:
#     k1: 诱导功率系数    [W / kg^1.5]  — 由悬停功率方程标定
#     k2: 废阻功率系数    [W / (m/s)^3] — 由风洞测试或文献确定
#
# 参数来源：
#   - 轻型：对标 DJI Mini 3 级别，2kg 总重悬停约 80W，15m/s 巡航约 110W
#   - 重型：对标 DJI M30 级别，8kg 总重悬停约 400W，10m/s 巡航约 500W
#   - k1 / k2 可通过场地实测或论文 [cf. Aurambout 2019, UAV energy models] 修正
# =====================================================================

light_drone:
  # 气动参数 —— 每次标定后须同步更新
  k1: 28.3          # W / kg^1.5   (悬停功率主导项)
  k2: 0.0059        # W / (m/s)^3  (巡航速度阻力项)

  # 飞行性能
  cruise_speed: 20.0           # m/s，巡航速度
  payload_capacity: 2.0        # kg，最大有效载荷
  empty_weight: 1.5            # kg，机体自重

  # 电池参数
  battery_capacity_j: 360000   # J，100 Wh ≈ 360,000 J
  # 安全余量：保留总电量的 10% 用于意外情况
  safe_margin_ratio: 0.10

heavy_drone:
  # 气动参数
  k1: 17.7          # W / kg^1.5   (大翼展，诱导系数更低)
  k2: 0.10          # W / (m/s)^3  (较大机体，阻力系数更高)

  # 飞行性能
  cruise_speed: 15.0           # m/s，巡航速度较慢
  payload_capacity: 10.0       # kg，最大有效载荷
  empty_weight: 5.0            # kg，机体自重

  # 电池参数
  battery_capacity_j: 2880000  # J，800 Wh ≈ 2,880,000 J
  safe_margin_ratio: 0.10
